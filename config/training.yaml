# Continuous-training config (layers on top of the vendored model config.yaml).
base_config: "registry/v7-base/config.yaml"

finetune:
  resume_from: live          # warm-start from the current live checkpoint
  epochs: 3                  # short nightly fine-tune (full from-scratch is ~25 ep / 5.7h)
  fresh_warmup_steps: 500    # cosine had decayed to min lr; re-warm briefly
  monitor_only_halt: true    # probe halt is advisory during fine-tune, not fatal

# Recency-weighted training. See ADR 0002 + 0005. Keyed off the CURRENT patch
# (7.41, 2026-03-25) so retrains favor the live meta, not the old 7.40 window.
recency:
  half_life_days: 60            # w = 0.5 ^ (age_days / half_life_days)
  current_patch_start: "2026-03-25"   # 7.41 boundary — defines "current patch"
  current_patch_upweight: 1.8   # psi: bump post-patch matches harder right after a patch

# Weekly from-scratch anchor retrain to bound long-run drift/forgetting.
anchor_retrain:
  enabled: true
  schedule: weekly
  epochs: 25

promotion:
  beat_incumbent_margin: 0.0005   # candidate must beat incumbent on the prequential window by >= this
  require_probes_pass: true       # frozen-anchor check removed — see ADR 0005
