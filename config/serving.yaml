# Dashboard / FastAPI serving config.
host: "0.0.0.0"        # LAN-only (bind behind the firewall, like claude-dashboard)
port: 8090
reload_poll_seconds: 30   # how often model_loader checks the registry 'live' pointer
device: "auto"            # auto -> cuda if available else cpu

# TLS — serve HTTPS so the LAN origin is a secure context (mic capture works
# without the chrome insecure-origin flag). Paths are relative to the repo root.
# Cert is a local-CA-signed leaf for aiserver2026 (SAN covers the LAN/Tailscale
# IPs + localhost); import certs/rootCA.pem into each client's trust store once.
# Comment both out to fall back to plain HTTP.
# Absolute paths so dev-preview worktrees (which don't carry the gitignored
# certs/ dir) resolve the same cert as the main service.
tls:
  certfile: "/mnt/projects/dotaml-live/certs/aiserver2026.pem"
  keyfile: "/mnt/projects/dotaml-live/certs/aiserver2026-key.pem"

# Feedback queue: voice/text → claude triage → approved ticket → claude
# implements in a worktree → dev preview server → accept merges to master.
feedback:
  whisper_model: "large-v3-turbo"   # faster-whisper model for voice memos
  whisper_device: "cpu"             # ctranslate2 needs cuBLAS 12; venv torch is cu13.
                                    # cpu int8 does a 60s memo in seconds — fine here.
                                    # set "auto" to try cuda first.
  triage_model: "sonnet"            # claude -p model that writes tickets
  implement_model: null             # null -> claude CLI default model; the
                                    # dashboard's Implementation defaults panel
                                    # (data/settings.json) and per-ticket
                                    # overrides take precedence over this
  implement_timeout_minutes: 60     # used when no effort level is set; effort
                                    # low/medium/high -> 30/60/180 min
  dev_ports: [8091, 8099]           # preview servers for implemented tickets

# Default query knobs (overridable per request)
defaults:
  hero_picks_top_k: 10
  combos_top_k: 15
  win_vs_duration_minutes: [15, 20, 25, 30, 35, 40, 45]
  item_build_beam_width: 32
