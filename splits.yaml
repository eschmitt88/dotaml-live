# Walk-forward HCE splits for the LIVE, drifting Turbo data.
#
# Unlike a research repo's single frozen holdout, the live service re-seals the
# *freshest* window as the test holdout each retrain cycle. See
# docs/decisions/0002-sealed-holdout-policy.md. This file holds the POLICY
# (window widths, embargo, anchor); the concrete dated windows for a given cycle
# are written by pipeline/seal_holdout.py into the cycle's metadata.

game_mode: 23            # Turbo
partition_field: start_time_date
date_format: "YYYY-MM-DD"
dedup_key: match_id
hero_id_range: [1, 150]

# --- prequential (test-then-train) evaluation — see docs/decisions/0004 ---
# The live model is scored on each new day BEFORE that day is folded into training
# (lag-free, honest). Promotion is a shadow head-to-head on the most recent eval_days
# the candidate hasn't trained on; after promotion the model is refit through "now"
# for serving (serving lag ~1 day). This replaces the walk_forward static holdout.
prequential:
  eval_days: 7           # evaluation horizon (candidate trained through now-eval_days
                         # for the gate; ~1.3M Turbo matches). NOT serving staleness.
  refit_for_serving: true   # after promotion, fine-tune the rest of the way through now

# --- LEGACY walk-forward policy (retained for the informational `split` column /
#     backward compat; no longer the promotion signal — superseded by `prequential`) ---
walk_forward:
  test_days: 14
  val_days: 14
  embargo_days: 1
  train_history: all

# Frozen anchor REMOVED (ADR 0005). A fixed pre-7.41 slice doesn't just freeze stale
# data — as an anti-regression tripwire it can wrongly BLOCK a model that correctly
# adapts to a new patch (the meta moved, so "regression" on the old meta is expected
# and good). Prequential monitoring already catches real regressions on CURRENT data
# (it caught 7.41), and the head-to-head gate covers "don't ship something worse".
# Nothing is held out permanently.

sealed_test: true
search_metrics_file: metrics.json        # validation-split metrics (search signal)
final_metrics_file: final_metrics.json   # sealed-test metrics (final pass only)
