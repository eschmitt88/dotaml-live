  id_max: 160
  vocab_size: 161
transformer_model:
  embed_dim: 256
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.0
  use_team_team_bias: true
  use_canonical_sort: true
  decoder_n_layers: 2
